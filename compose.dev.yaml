services:
  db:
    container_name: db-postgres
    image: postgres:18
    restart: always
    env_file:
      - backend/.env
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "5431:5432"
    volumes:
      - pgdata:/var/lib/postgresql

  backend:
    container_name: backend-dev
    build: backend/.
    restart: always
    env_file:
      - backend/.env
    depends_on:
      - db
    volumes:
      - ./backend:/app

volumes:
  pgdata: